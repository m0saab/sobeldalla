<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="UTF-8">
    <title>Squad Games Triangle</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; margin: 0; background-color: #FFFFFF; font-family: sans-serif;
            padding: 20px;
        }
        #game-logo { width: 150px; margin-bottom: 30px; }
        .row { display: flex; justify-content: center; margin: 4px 0; }
        .color-box { 
            width: 14vw; height: 14vw; max-width: 60px; max-height: 60px; 
            margin: 4px; border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            background-size: cover; background-position: center;
            transition: background-image 0.1s ease;
        }
        button { 
            margin-top: 40px; padding: 15px 40px; cursor: pointer; font-size: 1.2rem; 
            font-weight: bold; background-color: #333; color: white; border: none; border-radius: 8px;
            width: 100%; max-width: 300px;
        }
        button:disabled { background-color: #999; }
        
        #insta-link { margin-top: 30px; }
        #insta-link img { width: 50px; height: 50px; }

        @media (min-width: 600px) {
            .color-box { width: 60px; height: 60px; }
        }
    </style>
</head>
<body>

<img id="game-logo" src="logo.png" alt="Squad Games Logo">
<div id="triangle-container"></div>
<button id="gen-btn" onclick="startGeneration()">مشكي وعاود</button>
<a id="insta-link" href="https://www.instagram.com/squad.games.tn/" target="_blank">
    <img src="IG.svg" alt="Instagram">
</a>

<script>
    const container = document.getElementById('triangle-container');
    const CEMENT = 'url("cement.jpg")', YAJOUR = 'url("yajour.jpg")', BLACK = '#212121';
    const itemPool = [...Array(7).fill(CEMENT), ...Array(7).fill(YAJOUR), BLACK];
    const structure = [1, 2, 3, 4, 5];

    function init() {
        container.innerHTML = '';
        structure.forEach(count => {
            const row = document.createElement('div');
            row.className = 'row';
            for (let i = 0; i < count; i++) {
                const box = document.createElement('div');
                box.className = 'color-box';
                row.appendChild(box);
            }
            container.appendChild(row);
        });
    }

    function shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
    }

    async function startGeneration() {
        const btn = document.getElementById('gen-btn');
        const boxes = document.querySelectorAll('.color-box');
        btn.disabled = true;

        const startTime = Date.now();
        while (Date.now() - startTime < 2000) {
            const temp = shuffle([...itemPool]);
            boxes.forEach((box, i) => {
                box.style.backgroundImage = temp[i] === BLACK ? 'none' : temp[i];
                box.style.backgroundColor = temp[i] === BLACK ? BLACK : 'transparent';
            });
            await new Promise(r => setTimeout(r, 100));
        }

        const final = shuffle([...itemPool]);
        boxes.forEach((box, i) => {
            box.style.backgroundImage = final[i] === BLACK ? 'none' : final[i];
            box.style.backgroundColor = final[i] === BLACK ? BLACK : 'transparent';
        });
        btn.disabled = false;
    }

    init();
</script>
</body>
</html>
